{% extends 'base.html' %}
{% block contenido %}

<div class="container mt-5">

<h1>Cultivos</h1>

<form method="GET" class="mb-3">
<input type="text" name="buscar" class="form-control" placeholder="Buscar...">
</form>

<form method="GET" class="mb-4">
<select name="suelo" class="form-select">
<option value="">Filtrar por suelo</option>
{% for suelo in suelos %}
<option value="{{ suelo.id }}">{{ suelo.nombre }}</option>
{% endfor %}
</select>
<button class="btn btn-primary mt-2">Filtrar</button>
</form>

<div class="row">

{% for cultivo in cultivos %}
<div class="col-md-4 mb-4">

<div class="card">

{% if cultivo.imagen %}
<img src="{{ cultivo.imagen.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
{% endif %}

<div class="card-body">
<h5>{{ cultivo.nombre }}</h5>
<p>{{ cultivo.descripcion }}</p>
</div>

</div>
</div>
{% endfor %}

</div>

</div>

{% endblock %}
